<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pevnost Morvakaru</title>

  <style>

    body {
      margin: 0;
      padding: 20px;

      background:
        linear-gradient(rgba(0,0,0,0.78), rgba(0,0,0,0.92)),
        url("images/morvakar.png"); 

      background-size: cover;
      background-position: center;
      background-attachment: fixed;

      color: #e0e0e0;
      font-family: Arial, sans-serif;
    }

    #container {
      max-width: 700px;
      margin: auto;

      background: rgba(15,15,15,0.88);

      border: 1px solid rgba(180,30,30,0.25);

      border-radius: 16px;

      padding: 30px;

      backdrop-filter: blur(4px);

      box-shadow:
        0 0 30px rgba(0,0,0,0.7),
        0 0 10px rgba(120,0,0,0.2);
    }

    h1 {
      color: #c0392b;
      text-align: center;
      margin-bottom: 30px;
      font-size: 34px;
      letter-spacing: 1px;

      text-shadow:
        0 0 10px rgba(180,30,30,0.35);
    }

    h2 {
      color: #c0392b;
      margin-bottom: 25px;
      font-size: 20px;
      letter-spacing: 1px;

      border-bottom: 1px solid rgba(192,57,43,0.25);
      padding-bottom: 10px;
    }

    p {
      line-height: 1.8;
      font-size: 18px;
      color: #dddddd;
    }

    input {
      width: 100%;
      padding: 15px;

      background: #1b1b1b;
      border: 1px solid #5a1b1b;
      color: white;

      font-size: 16px;
      border-radius: 10px;

      box-sizing: border-box;
      margin-bottom: 15px;
    }

    input:focus {
      outline: none;
      border-color: #c0392b;
      box-shadow: 0 0 10px rgba(192,57,43,0.4);
    }

    button {
      display: block;
      width: 100%;

      padding: 15px;
      margin-top: 12px;

      background: linear-gradient(#262626, #1a1a1a);

      color: #f0f0f0;

      border: 1px solid #5f1f1f;
      border-radius: 10px;

      cursor: pointer;

      font-size: 16px;
      transition: 0.2s;
    }

    button:hover {
      background: linear-gradient(#351515, #220d0d);
      border-color: #c0392b;
      transform: translateY(-2px);
      box-shadow: 0 0 12px rgba(192,57,43,0.25);
    }

    img {
      width: 100%;
      border-radius: 12px;

      margin-top: 20px;
      margin-bottom: 20px;

      border: 1px solid rgba(192,57,43,0.25);
      opacity: 0.95;
    }

    #muteButton {
      position: fixed;
      top: 15px;
      right: 15px;

      width: auto;
      padding: 10px 15px;

      z-index: 1000;

      background: rgba(20,20,20,0.9);
    }

    @media (max-width: 700px) {

      body {
        padding: 10px;
      }

      #container {
        padding: 20px;
      }

      h1 {
        font-size: 28px;
      }

      p {
        font-size: 16px;
      }

    }

  </style>
</head>

<body>

  <audio id="bgMusic" loop autoplay>
    <source src="audio/morvakar.mp3" type="audio/mpeg">
  </audio>

  <button id="muteButton" onclick="toggleMusic()">
    🔊 Zvuk
  </button>

  <div id="container">

    <div id="startScreen">

      <h1>Pevnost Morvakaru — Zlo se probouzí</h1>

      <input id="playerName" placeholder="Zadej své jméno">

      <button onclick="startGame()">
        Vstoupit do pevnosti
      </button>

    </div>

    <div id="game" style="display:none;">

      <h2 id="chapter"></h2>

      <img id="sceneImage" style="display:none;">

      <p id="text"></p>

      <div id="choices"></div>

    </div>

  </div>

  <script>

    let playerName = ""
    let score = 0

    const story = {

      start: {
        chapter: "AKT I — Hradby pevnosti",
        text: "Před tebou stojí Pevnost Morvakaru.",
        choices: [
          { text: "Vstup hlavní bránou", next: "gate" },
          { text: "Tajná stezka podél hradeb", next: "wall" }
        ]
      },

      gate: {
        chapter: "AKT I — Hradby pevnosti",
        text: "Prošel jsi hlavní branou.",
        choices: [{ text: "Pokračovat", next: "start" }]
      },

      wall: {
        chapter: "AKT II — Zapomenuté chodby",
        text: "Našel jsi tajný vstup.",
        choices: [{ text: "Pokračovat", next: "ending1" }]
      },

      ending1: {
        chapter: "AKT IV — Probuzení",
        text: "Ztracen v hlubinách",
        choices: [{ text: "Ukončit hru", next: "submitEnding" }]
      }

    }

    function startGame() {

      playerName = document.getElementById("playerName").value

      if(playerName === "") {
        alert("Zadej jméno")
        return
      }

      document.getElementById("bgMusic").play()

      document.getElementById("startScreen").style.display = "none"
      document.getElementById("game").style.display = "block"

      loadScene("start")
    }

    function loadScene(sceneName) {

      const scene = story[sceneName]

      document.getElementById("chapter").innerText = scene.chapter || ""
      document.getElementById("text").innerText = scene.text

      const sceneImage = document.getElementById("sceneImage")

      if(scene.image) {
        sceneImage.src = scene.image
        sceneImage.style.display = "block"
      } else {
        sceneImage.style.display = "none"
      }

      const choicesDiv = document.getElementById("choices")
      choicesDiv.innerHTML = ""

      scene.choices.forEach(choice => {

        const button = document.createElement("button")
        button.innerText = choice.text

        button.onclick = function() {
          if(choice.next === "submitEnding") {
            submitResult("Ztracen v hlubinách")
          } else {
            loadScene(choice.next)
          }
        }

        choicesDiv.appendChild(button)

      })
    }

    async function submitResult(endingName) {

      await fetch("https://script.google.com/macros/s/AKfycbz8HdV3nx1InI0ClRLeW20MvLj9bXnH3n0dG__GLjai27CXBBwnnBqrCicqe8JrYeYo/exec", {
        method: "POST",
        body: JSON.stringify({
          name: playerName,
          ending: endingName,
          score: score
        })
      })

      alert("Výsledek uložen!")
    }

    function toggleMusic() {

      const music = document.getElementById("bgMusic")
      music.muted = !music.muted

      const button = document.getElementById("muteButton")

      button.innerText = music.muted ? "🔇 Ztlumeno" : "🔊 Zvuk"
    }

  </script>

</body>
</html>
